version: '3.8'

services:
  db:
    image: postgres
    container_name: dev-postgres

    ports:
      - 5432:5432

    volumes:
      - ./postgres:/var/lib/postgresql/data

    environment:
      - POSTGRES_PASSWORD=GNX-0093
      - POSTGRES_USER=Testuser
      - POSTGRES_DB=openboardbackend

    restart: always